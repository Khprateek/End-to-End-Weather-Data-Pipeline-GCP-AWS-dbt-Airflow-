# docker-compose.yml
# ------------------
# Spins up a local Airflow 2.9 environment with:
#   - Postgres (metadata DB)
#   - Airflow webserver  → http://localhost:8080
#   - Airflow scheduler
#   - Airflow triggerer
#
# Usage:
#   docker-compose up airflow-init   # first time only
#   docker-compose up -d             # start all services
#   docker-compose down              # stop

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    # Pass your .env variables into every Airflow container
    OWM_API_KEY: ${OWM_API_KEY}
    STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
    LOCAL_OUTPUT_DIR: /opt/airflow/data/raw
  volumes:
    - ./dags:/opt/airflow/dags          # your DAG file
    - ./src:/opt/airflow/src            # extract_weather.py
    - ./data:/opt/airflow/data          # raw output lands here
    - ./logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "airflow db migrate &&
               airflow users create
                 --username admin
                 --password admin
                 --firstname Admin
                 --lastname User
                 --role Admin
                 --email admin@example.com"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    restart: unless-stopped

volumes:
  postgres_data: