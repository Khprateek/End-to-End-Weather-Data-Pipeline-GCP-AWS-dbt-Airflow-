macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  weather_pipeline:
    staging:
      +materialized: view
      +dataset: stg_weather
    intermediate:
      +materialized: table
      +dataset: stg_weather
    mart:
      +materialized: table
      +dataset: mart_weather
