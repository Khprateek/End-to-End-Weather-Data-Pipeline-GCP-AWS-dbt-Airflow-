name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:

  # ── Job 1: Lint & test Python ───────────────────────────────────────────────
  python-checks:
    name: Lint & Test Python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-mock

      - name: Lint with ruff
        run: |
          ruff check src/ loaders/ dags/ --output-format=github

      - name: Run unit tests
        env:
          OWM_API_KEY: dummy_key_for_tests
          STORAGE_BACKEND: local
          LOCAL_OUTPUT_DIR: /tmp/weather_raw
        run: |
          pytest tests/ -v --tb=short

  # ── Job 2: dbt compile & test ───────────────────────────────────────────────
  dbt-checks:
    name: dbt Compile & Test
    runs-on: ubuntu-latest
    needs: python-checks          # only run if Python checks pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dbt
        run: |
          pip install dbt-bigquery==1.8.0

      - name: Write GCP credentials from secret
        run: |
          echo '${{ secrets.GCP_CREDENTIALS_JSON }}' > gcp-credentials.json

      - name: Write dbt profiles
        run: cp dbt/profiles.yml ~/.dbt/profiles.yml
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: gcp-credentials.json

      - name: dbt deps
        working-directory: dbt
        run: dbt deps

      - name: dbt compile (syntax check)
        working-directory: dbt
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: ../gcp-credentials.json
        run: dbt compile

      - name: dbt test (data quality)
        working-directory: dbt
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: ../gcp-credentials.json
        run: dbt test

      - name: Upload dbt docs
        if: github.ref == 'refs/heads/main'
        working-directory: dbt
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: ../gcp-credentials.json
        run: |
          dbt docs generate
          echo "dbt docs generated successfully"

      - name: Clean up credentials
        if: always()
        run: rm -f gcp-credentials.json

  # ── Job 3: Docker build check ───────────────────────────────────────────────
  docker-check:
    name: Docker Compose Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config

  # ── Job 4: Summary badge ────────────────────────────────────────────────────
  ci-success:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [python-checks, dbt-checks, docker-check]
    if: success()

    steps:
      - name: All checks passed
        run: echo "✅ All CI checks passed — safe to merge."
